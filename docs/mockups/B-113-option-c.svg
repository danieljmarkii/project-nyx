<svg xmlns="http://www.w3.org/2000/svg" width="880" height="1010" viewBox="0 0 880 1010" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <symbol id="thumb" viewBox="0 0 44 44">
      <rect width="44" height="44" rx="8" fill="#EEF1F3" stroke="#E4E8EB"/>
      <circle cx="15" cy="16" r="4" fill="#CBD3D8"/>
      <path d="M7 35 L19 21 L27 30 L33 24 L38 35 Z" fill="#CBD3D8"/>
    </symbol>
  </defs>

  <!-- canvas -->
  <rect width="880" height="1010" fill="#E9EBEE"/>

  <!-- title -->
  <text x="40" y="46" font-size="25" font-weight="600" fill="#0A0A0A">Option C — keep the split, harmonize the language</text>
  <text x="40" y="72" font-size="14" fill="#525252">Same grouping · type · tokens → reads as one family.  Different unit on purpose → two modes (tap-to-log vs. tap-to-open).</text>

  <!-- ====================== LEFT PHONE — PICKER (action) ====================== -->
  <rect x="40" y="96" width="360" height="770" rx="30" fill="#FFFFFF" stroke="#E2E2E2" filter="url(#ds)"/>

  <!-- status bar -->
  <text x="60" y="130" font-size="13" font-weight="600" fill="#0A0A0A">9:41</text>
  <rect x="352" y="121" width="22" height="11" rx="2.5" fill="none" stroke="#0A0A0A" stroke-width="1.2"/>
  <rect x="354" y="123.5" width="15" height="6" rx="1" fill="#0A0A0A"/>

  <!-- header -->
  <text x="60" y="178" font-size="20" fill="#737373">‹</text>
  <text x="200" y="176" font-size="16" font-weight="600" fill="#0A0A0A" text-anchor="middle">What did Mochi eat?</text>
  <line x1="40" y1="196" x2="400" y2="196" stroke="#EAEAEA" stroke-width="1"/>

  <!-- Add CTA -->
  <rect x="60" y="214" width="320" height="56" rx="16" fill="#E0FBF7"/>
  <text x="78" y="250" font-size="22">📷</text>
  <text x="112" y="240" font-size="15" font-weight="500" fill="#0A0A0A">Snap a new food</text>
  <text x="112" y="258" font-size="12" fill="#525252">Or choose from your photos</text>

  <!-- Recent zone -->
  <text x="60" y="294" font-size="11" font-weight="600" fill="#737373" letter-spacing="0.8">RECENT</text>
  <!-- recent tile 1 -->
  <rect x="60" y="302" width="150" height="68" rx="14" fill="#FFFFFF" stroke="#EAEAEA"/>
  <text x="72" y="326" font-size="9.5" font-weight="600" fill="#737373" letter-spacing="0.6">ROYAL CANIN · DRY</text>
  <text x="72" y="346" font-size="14" font-weight="500" fill="#0A0A0A">Hydrolyzed</text>
  <text x="72" y="362" font-size="14" font-weight="500" fill="#0A0A0A">Protein</text>
  <!-- recent tile 2 -->
  <rect x="222" y="302" width="150" height="68" rx="14" fill="#FFFFFF" stroke="#EAEAEA"/>
  <text x="234" y="326" font-size="9.5" font-weight="600" fill="#737373" letter-spacing="0.6">HILL'S · DRY</text>
  <text x="234" y="346" font-size="14" font-weight="500" fill="#0A0A0A">Science Diet</text>
  <text x="234" y="362" font-size="14" font-weight="500" fill="#0A0A0A">i/d</text>

