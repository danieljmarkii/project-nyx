  <rect x="500" y="260" width="320" height="72" rx="16" fill="#FFFFFF" stroke="#EAEAEA"/>
  <use href="#thumb" x="512" y="274" width="44" height="44"/>
  <text x="568" y="288" font-size="9.5" font-weight="600" fill="#737373" letter-spacing="0.6">ROYAL CANIN · DRY</text>
  <text x="568" y="306" font-size="14" font-weight="500" fill="#0A0A0A">Hydrolyzed Protein</text>
  <text x="568" y="322" font-size="11" font-weight="500" fill="#525252">Finished 9 of 11 meals</text>
  <text x="806" y="302" font-size="20" fill="#A3A3A3" text-anchor="end">›</text>

  <!-- shared: section title "Meals" -->
  <rect x="490" y="360" width="3" height="16" rx="1.5" fill="#00C2A8"/>
  <text x="500" y="374" font-size="20" font-weight="600" fill="#0A0A0A">Meals</text>

  <!-- shared: brand sub-header "Royal Canin" -->
  <rect x="490" y="388" width="3" height="14" rx="1.5" fill="#00C2A8"/>
  <text x="500" y="400" font-size="13" font-weight="500" fill="#0A0A0A">Royal Canin</text>
