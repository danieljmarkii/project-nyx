  <rect x="500" y="410" width="320" height="148" rx="16" fill="#FFFFFF" stroke="#EAEAEA"/>
  <use href="#thumb" x="512" y="422" width="44" height="44"/>
  <text x="568" y="436" font-size="9.5" font-weight="600" fill="#737373" letter-spacing="0.6">DRY</text>
  <text x="568" y="454" font-size="14" font-weight="500" fill="#0A0A0A">Hydrolyzed Protein</text>
  <text x="568" y="470" font-size="11" fill="#525252">Last logged 2 days ago · 14 times</text>
  <text x="806" y="450" font-size="20" fill="#A3A3A3" text-anchor="end">›</text>
  <line x1="500" y1="484" x2="820" y2="484" stroke="#EAEAEA" stroke-width="1"/>
  <use href="#thumb" x="512" y="496" width="44" height="44"/>
  <text x="568" y="510" font-size="9.5" font-weight="600" fill="#737373" letter-spacing="0.6">DRY</text>
  <text x="568" y="528" font-size="14" font-weight="500" fill="#0A0A0A">Veterinary GI</text>
  <text x="568" y="544" font-size="11" fill="#525252">Last logged 5 days ago · 3 times</text>
  <text x="806" y="524" font-size="20" fill="#A3A3A3" text-anchor="end">›</text>

  <!-- shared: brand sub-header "Hill's" -->
  <rect x="490" y="572" width="3" height="14" rx="1.5" fill="#00C2A8"/>
  <text x="500" y="584" font-size="13" font-weight="500" fill="#0A0A0A">Hill's</text>
  <rect x="500" y="594" width="320" height="74" rx="16" fill="#FFFFFF" stroke="#EAEAEA"/>
  <use href="#thumb" x="512" y="606" width="44" height="44"/>
  <text x="568" y="620" font-size="9.5" font-weight="600" fill="#737373" letter-spacing="0.6">DRY</text>
  <text x="568" y="638" font-size="14" font-weight="500" fill="#0A0A0A">Science Diet i/d</text>
  <text x="568" y="654" font-size="11" fill="#525252">Last logged 9 days ago · 6 times</text>
  <text x="806" y="634" font-size="20" fill="#A3A3A3" text-anchor="end">›</text>

  <!-- tab bar (this IS a destination; the picker is a modal, so only this phone has one) -->
  <line x1="480" y1="812" x2="840" y2="812" stroke="#EAEAEA" stroke-width="1"/>
  <g fill="#A3A3A3" font-size="10" text-anchor="middle">
    <circle cx="540" cy="832" r="6" fill="none" stroke="#A3A3A3" stroke-width="1.4"/>
    <text x="540" y="852">Home</text>
    <circle cx="620" cy="832" r="6" fill="none" stroke="#A3A3A3" stroke-width="1.4"/>
    <text x="620" y="852">History</text>
    <circle cx="700" cy="832" r="6" fill="none" stroke="#00C2A8" stroke-width="1.6"/>
    <text x="700" y="852" fill="#00C2A8" font-weight="600">Foods</text>
    <circle cx="780" cy="832" r="6" fill="none" stroke="#A3A3A3" stroke-width="1.4"/>
    <text x="780" y="852">Pet</text>
  </g>
  <rect x="605" y="858" width="110" height="5" rx="2.5" fill="#0A0A0A" opacity="0.22"/>

  <!-- ====================== captions under each phone ====================== -->
  <text x="220" y="892" font-size="13" font-weight="600" fill="#0A0A0A" text-anchor="middle">Picker — the quick-log action</text>
  <text x="220" y="910" font-size="12" fill="#525252" text-anchor="middle">Dense 2-up tiles · tap a tile → logs the meal</text>
  <text x="660" y="892" font-size="13" font-weight="600" fill="#0A0A0A" text-anchor="middle">Foods tab — the browse / manage destination</text>
  <text x="660" y="910" font-size="12" fill="#525252" text-anchor="middle">Full-width rows · thumbnail · intake · tap a row → opens detail</text>

  <!-- ====================== legend ====================== -->
  <rect x="40" y="936" width="800" height="58" rx="12" fill="#FFFFFF" stroke="#EAEAEA"/>
  <rect x="60" y="952" width="3" height="26" rx="1.5" fill="#00C2A8"/>
  <text x="74" y="962" font-size="12.5" font-weight="600" fill="#0A0A0A">Shared (the teal marks) — section titles + brand grouping, plus the eyebrow / name type &amp; tokens.</text>
  <text x="74" y="980" font-size="12" fill="#525252">New for the picker: it gains the same brand grouping as the library (B-109). Everything else differs by design — that difference now reads as intentional, not arbitrary.</text>
</svg>
