  <text x="72" y="552" font-size="14" font-weight="500" fill="#0A0A0A">Hydrolyzed</text>
  <text x="72" y="568" font-size="14" font-weight="500" fill="#0A0A0A">Protein</text>
  <rect x="222" y="508" width="150" height="72" rx="14" fill="#FFFFFF" stroke="#EAEAEA"/>
  <text x="234" y="532" font-size="9.5" font-weight="600" fill="#737373" letter-spacing="0.6">DRY</text>
  <text x="234" y="552" font-size="14" font-weight="500" fill="#0A0A0A">Veterinary GI</text>

  <!-- shared: brand sub-header "Hill's" -->
  <rect x="50" y="588" width="3" height="14" rx="1.5" fill="#00C2A8"/>
  <text x="60" y="600" font-size="13" font-weight="500" fill="#0A0A0A">Hill's</text>
  <rect x="60" y="610" width="150" height="72" rx="14" fill="#FFFFFF" stroke="#EAEAEA"/>
  <text x="72" y="634" font-size="9.5" font-weight="600" fill="#737373" letter-spacing="0.6">DRY</text>
  <text x="72" y="654" font-size="14" font-weight="500" fill="#0A0A0A">Science Diet</text>
  <text x="72" y="670" font-size="14" font-weight="500" fill="#0A0A0A">i/d</text>
  <rect x="222" y="610" width="150" height="72" rx="14" fill="#FFFFFF" stroke="#EAEAEA"/>
  <text x="234" y="634" font-size="9.5" font-weight="600" fill="#737373" letter-spacing="0.6">DRY</text>
  <text x="234" y="654" font-size="14" font-weight="500" fill="#0A0A0A">Sensitive</text>
  <text x="234" y="670" font-size="14" font-weight="500" fill="#0A0A0A">Stomach</text>

  <!-- home indicator -->
  <rect x="165" y="846" width="110" height="5" rx="2.5" fill="#0A0A0A" opacity="0.22"/>

