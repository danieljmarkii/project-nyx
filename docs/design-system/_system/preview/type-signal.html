<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Type · Display Signal</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 32px 28px; background: var(--bg-app); }
    .label { font-size: 11px; font-weight: 500; color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
    .signal { font-family: var(--font-display); font-size: 26px; font-weight: 400; line-height: 1.3; letter-spacing: -0.3px; color: var(--fg-1); max-width: 580px; }
    .em { color: var(--accent-1); }
    .meta { margin-top: 18px; font-size: 11px; color: var(--fg-3); letter-spacing: 0.4px; }
  </style>
</head>
<body>
  <div class="label">Signal</div>
  <div class="signal">Vomiting dropped 60% in the two weeks after switching proteins — the diet trial appears to be working.</div>
  <div class="meta">Newsreader · 26 / 1.3 · weight 400 · tracking −0.3</div>
</body>
</html>
