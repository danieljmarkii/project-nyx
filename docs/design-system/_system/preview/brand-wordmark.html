<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Brand · Wordmark</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 32px 28px; font-family: var(--font-body); background: var(--bg-app); display: flex; align-items: center; gap: 56px; }
    .wordmark { font-family: var(--font-display); font-weight: 400; color: var(--fg-1); letter-spacing: -0.6px; }
    .lg { font-size: 56px; line-height: 1; }
    .md { font-size: 32px; line-height: 1; }
    .monogram { width: 44px; height: 44px; border-radius: 50%; background: #0A0A0A; color: white; display: grid; place-items: center; font-family: var(--font-display); font-size: 24px; font-weight: 400; letter-spacing: -1px; padding-bottom: 4px;}
    .label { font-size: 11px; color: var(--fg-3); letter-spacing: 0.4px; text-transform: uppercase; margin-top: 8px; }
    .col { display: flex; flex-direction: column; align-items: flex-start; }
  </style>
</head>
<body>
  <div class="col">
    <div class="wordmark lg">Nyx</div>
    <div class="label">Wordmark · Newsreader 56</div>
  </div>
  <div class="col">
    <div class="wordmark md">Nyx</div>
    <div class="label">Header · 32</div>
  </div>
  <div class="col">
    <div class="monogram">n</div>
    <div class="label">Monogram · interim</div>
  </div>
</body>
</html>
