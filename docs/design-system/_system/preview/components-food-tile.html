<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Components · Food tile</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 26px 28px; font-family: var(--font-body); background: #FAFAFA; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .tile {
      min-height: 96; border: 1px solid var(--border-1); border-radius: 16px;
      background: #FFFFFF; padding: 16px 16px 16px 16px;
      display: flex; flex-direction: column; gap: 8px;
      position: relative;
    }
    .dot { position: absolute; top: 18px; left: 16px; width: 8px; height: 8px; border-radius: 4px; }
    .meta { font-size: 11px; font-weight: 500; letter-spacing: 0.8px; padding-left: 14px; }
    .product { font-size: 15px; font-weight: 500; color: var(--fg-1); line-height: 1.3; }
  </style>
</head>
<body>
  <div class="tile">
    <div class="dot" style="background:#C0463A"></div>
    <div class="meta" style="color:#C0463A">FANCY FEAST · WET</div>
    <div class="product">Chunky Chicken Feast</div>
  </div>
  <div class="tile">
    <div class="dot" style="background:#1F5945"></div>
    <div class="meta" style="color:#1F5945">OPEN FARM · DRY</div>
    <div class="product">Homestead Turkey & Chicken</div>
  </div>
  <div class="tile">
    <div class="dot" style="background:#2C6FA6"></div>
    <div class="meta" style="color:#2C6FA6">STELLA & CHEWY · FREEZE-DRIED</div>
    <div class="product">Salmon Marie's Magical Dinner Dust</div>
  </div>
</body>
</html>
