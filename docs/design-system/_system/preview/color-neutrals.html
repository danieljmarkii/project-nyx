<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Color · Cool Neutrals</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 28px; background: #FAFAFA; }
    .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
    .sw { display: flex; flex-direction: column; gap: 6px; }
    .chip { aspect-ratio: 1 / 1.05; border-radius: 8px; border: 1px solid var(--border-1); }
    .name { font-size: 11px; color: var(--fg-2); letter-spacing: 0.4px; text-transform: uppercase; }
    .hex { font-size: 11px; color: var(--fg-3); font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0A0A0A;border-color:#0A0A0A"></div><div class="name">Ink</div><div class="hex">#0A0A0A</div></div>
    <div class="sw"><div class="chip" style="background:#262626;border-color:#262626"></div><div class="name">Mid</div><div class="hex">#262626</div></div>
    <div class="sw"><div class="chip" style="background:#525252"></div><div class="name">Text 2</div><div class="hex">#525252</div></div>
    <div class="sw"><div class="chip" style="background:#737373"></div><div class="name">Text 3</div><div class="hex">#737373</div></div>
    <div class="sw"><div class="chip" style="background:#A3A3A3"></div><div class="name">Disabled</div><div class="hex">#A3A3A3</div></div>
    <div class="sw"><div class="chip" style="background:#D4D4D4"></div><div class="name">Border 2</div><div class="hex">#D4D4D4</div></div>
    <div class="sw"><div class="chip" style="background:#EAEAEA"></div><div class="name">Border 1</div><div class="hex">#EAEAEA</div></div>
    <div class="sw"><div class="chip" style="background:#F5F5F5"></div><div class="name">Subtle</div><div class="hex">#F5F5F5</div></div>
    <div class="sw"><div class="chip" style="background:#FAFAFA"></div><div class="name">App bg</div><div class="hex">#FAFAFA</div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">Surface</div><div class="hex">#FFFFFF</div></div>
  </div>
</body>
</html>
