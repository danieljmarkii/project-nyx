<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Color · Accent</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 28px; display:flex; gap: 16px; align-items: stretch; background: #FAFAFA; }
    .block { flex: 1; border-radius: 12px; padding: 20px; border: 1px solid var(--border-1); display:flex; flex-direction: column; justify-content: space-between; min-height: 130px; }
    .swatch-name { font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase; font-weight: 500; }
    .swatch-hex { font-size: 14px; font-variant-numeric: tabular-nums; }
    .swatch-use { font-size: 12px; opacity: 0.78; line-height: 1.4; }
    .b-accent { background: #00C2A8; color: #FFFFFF; border-color: #00C2A8; }
    .b-tint { background: #E0FBF7; color: #00C2A8; }
    .line { height: 2px; background: #00C2A8; border-radius: 1px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="block b-accent">
    <div class="swatch-name">Accent · mint</div>
    <div>
      <div class="swatch-hex">#00C2A8</div>
      <div class="swatch-use" style="margin-top:6px">Interactive only. Trend line. Never decorative.</div>
    </div>
  </div>
  <div class="block b-tint">
    <div class="swatch-name">Accent · tint</div>
    <div>
      <div class="swatch-hex">#E0FBF7</div>
      <div class="swatch-use" style="margin-top:6px;color:#00C2A8">Active chip background. Meal event tint.</div>
      <div class="line"></div>
    </div>
  </div>
</body>
</html>
