<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Spacing · 8pt grid</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 26px 28px; font-family: var(--font-body); }
    .scale { display: flex; align-items: flex-end; gap: 22px; }
    .step { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .bar { background: #0A0A0A; border-radius: 2px; width: 28px; }
    .name { font-size: 11px; color: var(--fg-2); letter-spacing: 0.4px; }
    .val { font-size: 11px; color: var(--fg-3); font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="scale">
    <div class="step"><div class="bar" style="height:8px"></div><div class="name">1</div><div class="val">8</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="name">2</div><div class="val">16</div></div>
    <div class="step"><div class="bar" style="height:24px"></div><div class="name">3</div><div class="val">24</div></div>
    <div class="step"><div class="bar" style="height:32px"></div><div class="name">4</div><div class="val">32</div></div>
    <div class="step"><div class="bar" style="height:48px"></div><div class="name">5</div><div class="val">48</div></div>
    <div class="step"><div class="bar" style="height:64px"></div><div class="name">6</div><div class="val">64</div></div>
  </div>
</body>
</html>
