<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Spacing · Radius</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 26px 28px; font-family: var(--font-body); }
    .row { display: flex; gap: 22px; align-items: flex-end; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .box { width: 80px; height: 80px; background: var(--bg-app); border: 1px solid var(--border-2); }
    .name { font-size: 11px; color: var(--fg-2); }
    .val { font-size: 11px; color: var(--fg-3); font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">xs</div><div class="val">4</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">sm</div><div class="val">8</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">md</div><div class="val">16</div></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><div class="name">lg</div><div class="val">24</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="name">full</div><div class="val">∞</div></div>
  </div>
</body>
</html>
