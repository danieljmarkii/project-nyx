<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Color · Moments</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 24px 28px; font-family: var(--font-body); background: #FAFAFA; display: flex; gap: 20px; align-items: stretch; }
    .col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .demo {
      position: relative; height: 160px; border-radius: 12px;
      background: #FFFFFF; border: 1px solid #EAEAEA;
      display: grid; place-items: center; overflow: hidden;
    }
    .glow {
      position: absolute; width: 220px; height: 220px; border-radius: 50%;
      background: radial-gradient(circle, #FBBF2440 0%, #FBBF2410 45%, transparent 70%);
    }
    .ring {
      position: relative; z-index: 1;
      width: 72px; height: 72px; border-radius: 36px;
      background: #FFFFFF; border: 2px solid #00C2A8;
      display: grid; place-items: center;
      box-shadow: 0 6px 22px #FBBF2440;
    }
    .label { font-size: 11px; font-weight: 500; color: #525252; letter-spacing: 0.8px; text-transform: uppercase; }
    .sub { font-size: 12px; color: #525252; line-height: 1.45; }
    .hex { font-family: var(--font-body); font-size: 11px; color: #737373; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="col">
    <div class="demo">
      <div class="glow"></div>
      <div class="ring">
        <svg width="32" height="32" viewBox="0 0 40 40">
          <path d="M11 21 L18 27 L29 14" stroke="#00C2A8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
    </div>
    <div class="label">Moments · earned color</div>
    <div class="sub">Used &lt; 2s at a time, only on a real user action. Warm gold glow + mint check — the system's only warmth.</div>
  </div>
  <div class="col">
    <div style="display:flex; flex-direction:column; gap:10px; justify-content:center; height:100%;">
      <div style="display:flex; gap:10px; align-items:center;">
        <div style="width:28px; height:28px; border-radius:6px; background:#FBBF24"></div>
        <div><div style="font-size:13px; font-weight:500; color:#0A0A0A;">Glow · warm gold</div><div class="hex">#FBBF24</div></div>
      </div>
      <div style="display:flex; gap:10px; align-items:center;">
        <div style="width:28px; height:28px; border-radius:6px; background:#00C2A8"></div>
        <div><div style="font-size:13px; font-weight:500; color:#0A0A0A;">Confirm · accent mint</div><div class="hex">#00C2A8</div></div>
      </div>
      <div style="font-size: 11px; color: #737373; line-height: 1.5; margin-top: 8px; padding-top: 10px; border-top: 1px solid #EAEAEA;">
        The rule: this palette appears for less than 2 seconds at a time, and only as a reward for a real user action.
      </div>
    </div>
  </div>
</body>
</html>
