<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Components · Chips</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 26px 28px; font-family: var(--font-body); background: var(--bg-app); }
    .group { margin-bottom: 18px; }
    .grouplabel { font-size: 11px; font-weight: 500; color: var(--fg-2); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip { padding: 6px 12px; font-size: 13px; font-weight: 500; border-radius: 999px; border: 1px solid var(--border-1); background: white; color: var(--fg-2); }
    .chip.active-outline { background: #E0FBF7; border-color: #00C2A8; color: #00C2A8; }
    .chip.active-filled { background: #0A0A0A; border-color: #0A0A0A; color: white; }
  </style>
</head>
<body>
  <div class="group">
    <div class="grouplabel">Filter chip · outline (date presets)</div>
    <div class="row">
      <div class="chip">7 days</div>
      <div class="chip active-outline">14 days</div>
      <div class="chip">30 days</div>
      <div class="chip">All</div>
    </div>
  </div>
  <div class="group">
    <div class="grouplabel">Filter chip · filled (type filters)</div>
    <div class="row">
      <div class="chip active-filled">All events</div>
      <div class="chip">Meals</div>
      <div class="chip">Symptoms</div>
      <div class="chip">Stool</div>
    </div>
  </div>
</body>
</html>
